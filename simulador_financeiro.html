<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <h1>Simulador Financeiro</h1>

   <h3>Saiba os prejuízos que você terá caso não invista no nosso projeto:</h3>

    <!--3 campos de inserir e um botão-->
   Quantos m² de solo fértil possui sua estufa?: <input id="ipt_metros"><br>
   Produtividade por pé de tomate (em kg): <input id="ipt_produtividade"><br>
   Valor de venda (R$ por kg): <input id="ipt_venda"><br>
   Que tipo de tomate você planta?: <input id="ipt_tipo"><br>

   <br> <button onclick="tomate()">Calcule seus prejuízos</button><br>
   <br> <div id="div_msg"></div>
</body>

<script>
    //Variáveis globais para acumular no final
    let mes = 0;
    let acumulado = 0;

    function tomate() {
        //Variáveis para nomear os valores inseridos
        let venda = Number(ipt_venda.value);
        let metros = Number(ipt_metros.value);
        let tipo = ipt_tipo.value;
        let produtividade = Number(ipt_produtividade.value);
        
        //Cálculos
        let plantas = metros * 2 
        let resultado = plantas * produtividade; 
        let total = resultado * venda;
        let prejuizo = total * 0.125

        mes += 120;
        acumulado += prejuizo; 

        div_msg.innerHTML += 
            `A cada ${mes} dias com a estufa controlada você lucraria R$${total} no total, porém sem esse 
            monitoramento você sofre um prejuízo de R$${acumulado.toFixed(2)} na sua plantação de ${tipo}<br>`;
    }
</script>
</html>
